<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Телемост</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { margin-bottom: 20px; }
        .btn-group { display: flex; gap: 15px; margin-bottom: 30px; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .create-btn { background: #4CAF50; color: white; }
        .join-btn { background: #2196F3; color: white; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        .hidden { display: none; }
        .error { color: red; margin-top: 10px; }
        .loading { color: #666; margin-top: 10px; }
        .user-card {
            background: #f9f9f9;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .danger {
            background: #e74c3c;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>🎥 Телемост</h1>
    
    <div class="btn-group">
        <button class="create-btn" onclick="showCreate()">➕ Создать комнату</button>
        <button class="join-btn" onclick="showJoin()">🔗 Присоединиться</button>
    </div>
    
    <div id="createForm" class="hidden">
        <input type="text" id="roomName" placeholder="Название комнаты">
        <input type="password" id="password" placeholder="Пароль">
        <button class="create-btn" onclick="createRoom()">Создать</button>
        <div id="createMsg" class="error"></div>
        <div id="createLoading" class="loading"></div>
    </div>
    
    <div id="joinForm" class="hidden">
        <input type="text" id="joinRoomName" placeholder="Название комнаты">
        <input type="password" id="joinPassword" placeholder="Пароль">
        <button class="join-btn" onclick="joinRoom()">Присоединиться</button>
        <div id="joinMsg" class="error"></div>
        <div id="joinLoading" class="loading"></div>
    </div>
    
    <div id="adminPanel" class="hidden">
        <p>Комната: <strong id="adminRoomName"></strong></p>
        <div id="waitingList"></div>
        <button class="danger" onclick="closeRoom()">🚪 Закрыть комнату</button>
    </div>
    
    <div id="waitingPanel" class="hidden">
        <div class="spinner" style="width:40px;height:40px;border:3px solid #f0f0f0;border-top:3px solid #764ba2;border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto;"></div>
        <p id="waitingStatus">Ожидание подтверждения...</p>
    </div>
    
    <div id="videoPanel" class="hidden">
        <h2>🎬 Вы в телемосте!</h2>
        <p>Здесь будет видеосвязь</p>
        <button onclick="location.reload()">🚪 Выйти</button>
    </div>
</div>

<style>
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<script>
    const REPO = 'popov2012/YourMom228_joke';
    
    async function callWorkflow(action, payload, issueNumber = null) {
        // Создаём issue как канал связи
        let issueNum = issueNumber;
        
        if (!issueNum) {
            const response = await fetch(`https://api.github.com/repos/${REPO}/issues`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: `telemost-${Date.now()}`, body: 'temporary' })
            });
            const issue = await response.json();
            issueNum = issue.number;
        }
        
        // Триггерим workflow через repository_dispatch
        const dispatchResponse = await fetch(`https://api.github.com/repos/${REPO}/dispatches`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                event_type: action,
                client_payload: { ...payload, issue_number: issueNum }
            })
        });
        
        if (!dispatchResponse.ok) throw new Error('Failed to trigger workflow');
        
        // Ждём ответа от workflow (проверяем комментарии в issue)
        let attempts = 0;
        while (attempts < 30) {
            await new Promise(r => setTimeout(r, 2000));
            const commentsResponse = await fetch(`https://api.github.com/repos/${REPO}/issues/${issueNum}/comments`);
            const comments = await commentsResponse.json();
            const lastComment = comments[comments.length - 1];
            
            if (lastComment && lastComment.user.type === 'Bot') {
                try {
                    const result = JSON.parse(lastComment.body);
                    return result;
                } catch(e) {}
            }
            attempts++;
        }
        
        throw new Error('Workflow timeout');
    }
    
    async function createRoom() {
        const roomName = document.getElementById('roomName').value.trim();
        const password = document.getElementById('password').value;
        const msgDiv = document.getElementById('createMsg');
        const loadingDiv = document.getElementById('createLoading');
        
        if (!roomName || !password) {
            msgDiv.textContent = 'Заполните все поля';
            return;
        }
        
        loadingDiv.textContent = '⏳ Создание комнаты...';
        
        try {
            const userId = Math.random().toString(36).substring(2, 15);
            const result = await callWorkflow('create_room', { room_name: roomName, password: password, user_id: userId });
            
            if (result.success) {
                sessionStorage.setItem('adminRoom', roomName);
                sessionStorage.setItem('adminId', userId);
                loadingDiv.textContent = '✅ Комната создана!';
                setTimeout(() => showAdminPanel(roomName), 1000);
            } else {
                msgDiv.textContent = '❌ ' + (result.error || 'Ошибка');
                loadingDiv.textContent = '';
            }
        } catch (err) {
            msgDiv.textContent = '❌ Ошибка: ' + err.message;
            loadingDiv.textContent = '';
        }
    }
    
    async function joinRoom() {
        const roomName = document.getElementById('joinRoomName').value.trim();
        const password = document.getElementById('joinPassword').value;
        const msgDiv = document.getElementById('joinMsg');
        const loadingDiv = document.getElementById('joinLoading');
        
        if (!roomName || !password) {
            msgDiv.textContent = 'Заполните все поля';
            return;
        }
        
        loadingDiv.textContent = '⏳ Поиск комнаты...';
        
        try {
            const userId = Math.random().toString(36).substring(2, 15);
            const result = await callWorkflow('join_room', { room_name: roomName, password: password, user_id: userId });
            
            if (result.success) {
                sessionStorage.setItem('waitingRoom', roomName);
                sessionStorage.setItem('userId', userId);
                loadingDiv.textContent = '✅ Вход выполнен!';
                setTimeout(() => showWaitingPanel(roomName, userId), 1000);
            } else {
                msgDiv.textContent = '❌ ' + (result.error || 'Ошибка');
                loadingDiv.textContent = '';
            }
        } catch (err) {
            msgDiv.textContent = '❌ Ошибка: ' + err.message;
            loadingDiv.textContent = '';
        }
    }
    
    function showAdminPanel(roomName) {
        document.getElementById('createForm').classList.add('hidden');
        document.getElementById('joinForm').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        document.getElementById('adminRoomName').textContent = roomName;
        
        // Обновляем список ожидающих
        setInterval(async () => {
            const result = await callWorkflow('get_room', { room_name: roomName });
            if (result.success && result.room && result.room.waiting) {
                const listDiv = document.getElementById('waitingList');
                if (result.room.waiting.length === 0) {
                    listDiv.innerHTML = '<p>✨ Нет ожидающих</p>';
                } else {
                    let html = '';
                    result.room.waiting.forEach(user => {
                        html += `
                            <div class="user-card">
                                <span>👤 ${user.userId.substring(0, 8)}...</span>
                                <div>
                                    <button onclick="approveUser('${roomName}', '${user.userId}')" style="background:#27ae60;padding:5px 15px;border:none;border-radius:5px;cursor:pointer">✅</button>
                                    <button onclick="rejectUser('${roomName}', '${user.userId}')" style="background:#e74c3c;padding:5px 15px;border:none;border-radius:5px;cursor:pointer">❌</button>
                                </div>
                            </div>
                        `;
                    });
                    listDiv.innerHTML = html;
                }
            }
        }, 3000);
    }
    
    async function approveUser(roomName, userId) {
        await callWorkflow('approve_user', { room_name: roomName, user_id: userId });
    }
    
    async function rejectUser(roomName, userId) {
        await callWorkflow('reject_user', { room_name: roomName, user_id: userId });
    }
    
    async function closeRoom() {
        if (!confirm('Закрыть комнату?')) return;
        sessionStorage.removeItem('adminRoom');
        location.reload();
    }
    
    function showWaitingPanel(roomName, userId) {
        document.getElementById('createForm').classList.add('hidden');
        document.getElementById('joinForm').classList.add('hidden');
        document.getElementById('waitingPanel').classList.remove('hidden');
        
        const interval = setInterval(async () => {
            const result = await callWorkflow('get_room', { room_name: roomName });
            if (result.success && result.room && result.room.approved && result.room.approved.includes(userId)) {
                clearInterval(interval);
                document.getElementById('waitingStatus').innerHTML = '✅ Доступ разрешен! Перенаправление...';
                setTimeout(() => {
                    document.getElementById('waitingPanel').classList.add('hidden');
                    document.getElementById('videoPanel').classList.remove('hidden');
                }, 1000);
            }
        }, 3000);
    }
    
    function showCreate() {
        document.getElementById('createForm').classList.remove('hidden');
        document.getElementById('joinForm').classList.add('hidden');
    }
    
    function showJoin() {
        document.getElementById('joinForm').classList.remove('hidden');
        document.getElementById('createForm').classList.add('hidden');
    }
    
    const adminRoom = sessionStorage.getItem('adminRoom');
    if (adminRoom) showAdminPanel(adminRoom);
</script>
</body>
</html>
